<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;family=Fira+Code:wght@700&amp;family=Fira+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Fira Sans", "Public Sans", "sans-serif"],
                        "mono": ["Fira Code", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background-color: rgba(239, 246, 255, 0.8);
            backdrop-filter: blur(12px);
        }
        .pulse-animation {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#EFF6FF] dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Main Content Area -->
<main class="flex-1 flex flex-col p-6 gap-6 max-w-md mx-auto w-full">
<!-- Header Minimalist -->
<div class="flex items-center justify-between mt-4">
<div>
<h1 class="text-xs uppercase tracking-widest text-slate-500 dark:text-slate-400 font-bold">Logística Transp</h1>
<p class="text-lg font-bold">Olá, Motorista</p>
</div>
<div class="bg-white/50 dark:bg-white/10 p-2 rounded-full">
<span class="material-symbols-outlined text-primary">notifications</span>
</div>
</div>
<!-- ETA Central Card -->
<div class="flex-1 flex flex-col items-center justify-center gap-8 bg-white dark:bg-slate-900/50 rounded-3xl p-8 shadow-sm border border-slate-100 dark:border-slate-800">
<div class="text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-2 uppercase tracking-tight">ETA Atual</p>
<h2 class="text-7xl font-mono font-bold text-slate-900 dark:text-white">14:30</h2>
</div>
<div class="w-full h-48 bg-slate-100 dark:bg-slate-800 rounded-2xl overflow-hidden relative" data-location="São Paulo, Brazil" style="">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Simplified city map view for navigation route" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBuO4lZHJAArb7aU0u5VeP63hV8tU0lZMyAWj6jra6IP3r_n2GeItQNWeqM8Fl1b5T2Bl2FgeD-bzxrXAW1wRZW8M_n2KTjaLRBg-uh3OyiI9p030nbRchCzjQ3l1U_LhD3wMWmwwGIDLi0dSF7V1IRP0B0tWD96yCfBh4SK5Q4SUpBY7Zs91aRLnPWrGcTp068GcFYlcjD2dxnBOXSpTZXm1VpAlPkCtcLMdp98lT9b2YBjEJxULQgl49qYPvWfwMFYTOl2hsN6MY')"></div>
<div class="absolute bottom-4 left-4 bg-white/90 dark:bg-slate-900/90 px-3 py-1 rounded-full text-xs font-bold shadow-sm">
                    BR-116 Km 244
                </div>
</div>
<button class="w-full bg-[#F97316] hover:bg-primary transition-colors text-white py-5 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-orange-500/20 active:scale-[0.98]">
<span class="material-symbols-outlined">warning</span>
<span class="text-lg font-bold">Reportar Evento (Caos)</span>
</button>
</div>
<!-- Safe Check Section -->
<div class="bg-white dark:bg-slate-900/50 rounded-2xl p-5 flex items-center justify-between border border-slate-100 dark:border-slate-800 shadow-sm">
<div class="flex items-center gap-4">
<div class="relative">
<div class="w-3 h-3 bg-green-500 rounded-full pulse-animation"></div>
</div>
<div>
<p class="text-base font-bold">Safe-Check</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Sistema Operacional Online</p>
</div>
</div>
<label class="relative flex h-[31px] w-[51px] cursor-pointer items-center rounded-full border-none bg-slate-200 dark:bg-slate-700 p-0.5 has-[:checked]:justify-end has-[:checked]:bg-green-500">
<div class="h-full w-[27px] rounded-full bg-white shadow-md"></div>
<input checked="" class="invisible absolute" type="checkbox"/>
</label>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="sticky bottom-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-6 pb-8 pt-4">
<div class="flex justify-between items-center max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 group text-primary" href="#">
<div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-primary/10 transition-all">
<span class="material-symbols-outlined font-variation-fill">local_shipping</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-wider">Entrega</p>
</a>
<a class="flex flex-col items-center gap-1 group text-slate-400 dark:text-slate-500" href="#">
<div class="flex h-10 w-10 items-center justify-center rounded-2xl transition-all">
<span class="material-symbols-outlined">map</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-wider">Mapa</p>
</a>
<a class="flex flex-col items-center gap-1 group text-slate-400 dark:text-slate-500" href="#">
<div class="flex h-10 w-10 items-center justify-center rounded-2xl transition-all">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-[10px] font-bold uppercase tracking-wider">Perfil</p>
</a>
</div>
</nav>
</body></html>
